<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign-up method</title>
    <!-- Sets the title of the webpage. -->
    <!-- Appears on the browser tab. -->
    <style>
        h1{
            text-align: center;
        }
        /* Targets the <h1> element.
        text-align: center; centers the heading. */
        form{
            justify-content: center;/* centers the heading. */
            display: flex;/* Makes the form a flex container. */
            flex-direction: column;/* Arranges items vertically. */
            gap: 20px;/* Adds 20px space between form elements. */
            align-items: center;
        }
        input{
            height: 20px; 
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>sign-up</h1>
    <form>
        <input type="text" placeholder="username" required>
        <input type="text" placeholder="email" required>
        <input type="text" placeholder="password" required>
        <button>signup</button>
    </form>
</body>
</html>
