<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table with rowspan and colspan</title>
    <style>
        table,
        th,
        tr,
        td {
            border: 1px solid black;
        }

        /* table
th (table heading cells)
tr (table rows)
td (table data cells) */
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2">Heading</th><!--rowspan="2"

Means this cell spans across 2 rows vertically.

So the "Heading" cell occupies space in:

Row 1
Row 2 -->
                <th>Students</th>
                <th colspan="3">Details</th>
                <!-- Means this heading spans across 3 columns horizontally.

So "Details" covers:

Name
Department
Roll No -->
            </tr>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Department</th>
                <th>Roll No</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="4">Student List</td>
                <!-- This cell spans 4 rows vertically. -->
                <td>1</td>
                <td>John Doe</td>
                <td>Computer Science</td>
                <td>101</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Jane Smith</td>
                <td>Mathematics</td>
                <td>102</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Emily Davis</td>
                <td>Physics</td>
                <td>103</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Michael Brown</td>
                <td>Chemistry</td>
                <td>104</td>
            </tr>
        </tbody>
    </table>

</body>

</html>
<!-- 
rowspan

Merges cells vertically.

Example:

rowspan="4"

Means:

👉 occupy 4 rows.

colspan

Merges cells horizontally.

Example:

colspan="3"

Means:

👉 occupy 3 columns. -->
