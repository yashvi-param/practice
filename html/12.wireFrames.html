<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html wireframes</title>
    <style>
        header,
        main,
        section,
        footer{
            border:1px solid black;
        }
        /* Selects all header, main, section, and footer elements. */
        nav{
             display: flex; /*Makes items inside the navigation appear in a row. */
             justify-content: space-between; /* Places the logo on the left and menu items on the right. */
        }
        ul{
            display: flex;
            gap: 50px;
        }
        li{
            list-style: none;
        }
        section h1{
            height: 300px;
            text-align: center;
        }
        footer h1{
            height:100px;
            text-align: center;
        }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <h1>logo</h1>
        <ul>
          <li>Home</li>
          <li>About</li>
          <li>Service</li>
          <li>Contact</li>
          <li>Help</li>
        </ul>
      </nav>
    </header>

    <main>
            <section id="home"><h1>this is hero section</h1></section>
            <!-- Displays the Hero Section heading. -->
            <section id="About"><h1>this is About section</h1></section>
            <!-- Creates an About section. -->
            <section id="Service"><h1>this is Service section</h1></section>
            <!-- Displays Service section heading. -->
            <section id="Contact"><h1>this is Contact section</h1></section>
            <!-- Creates a Contact section. -->
            <section id="Help"><h1>this is Help section</h1></section>
            <!-- Creates a Help section -->
    </main>

    <footer>
        <h1>this is footer section</h1>
    </footer>
  </body>
</html>
