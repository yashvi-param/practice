<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media tag</title>
</head>
<body>


    <!-- audio -->

    <audio controls>
        <!-- Creates an audio player.controls displays play, pause, volume, and other audio controls. -->
        <source src="assets/Bhula Dena..mp3"  type="audio/mpeg" ></source>
        <!-- Specifies the audio file.src is the path of the audio file.type="audio/mpeg" indicates the file is an MP3 audio file. -->
    </audio>
    
    <!-- video -->
      <video height="300"  width="500" controls autoplay  muted loop>
        <!-- height="300" → Video height is 300 pixels.width="500" → Video width is 500 pixels.controls → Shows play, pause, volume, and fullscreen controls.autoplay → Video starts automatically when the page loads.muted → Video starts with no sound.loop → Video repeats automatically after ending. -->
        <source src="assets/15481728_3840_2160_60fps.mp4" type="video/mp4"></source>
        <!-- Specifies the video file.src contains the file path.type="video/mp4" tells the browser the video format is MP4. -->
    </video>
</body>
</html>
