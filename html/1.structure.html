<!doctype html>
<!-- Declares document type and HTML version (HTML5) -->
<html lang="en">
  <!-- Root element; lang attribute sets page language to English -->
  <head>
    <!-- Container for metadata (not displayed) -->
    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 (supports most characters) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Responsive design: matches device width and initial zoom -->
    <title>structure of html</title>
    <!-- Page title shown in browser tab -->
  </head>
  <!-- End of head section -->
  <body>
    <!-- Contains visible page content -->
  </body>
  <!-- End of body -->
</html>
<!-- End of HTML document -->

<!-- what is html -->
<!--  HTML (HyperText Markup Language) is the standard language for
creating web pages. It uses tags to structure content—like headings, paragraphs,
images, and links—and tells browsers how to display them. -->

<!-- why we use this? 
HTML is used to structure and present content on the web. It
defines the elements (headings, paragraphs, images, links, etc.) that browsers
render into a formatted page. Without HTML, web pages would consist of raw,
unformatted text. -->

<!-- how we use html 
You write HTML tags in a text file (`.html`), then open that
file in a web browser. The browser interprets the tags and renders the content
as a structured web page. You can also embed CSS for styling and JavaScript for
interactivity directly in the HTML or link to external files. -->
