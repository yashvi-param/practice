<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
      table,
      th,
      tr,
      td {
        border: 1px solid black;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th rowspan="3">Day</th>
          <th colspan="3">Seminar</th>
        </tr>
        <tr>
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topic</th>
        </tr>
        <tr>
            <th>being</th>
            <th>end</th>
        </tr>
      </thead>
      <tbody>
        <tr>
            <td rowspan="2">Monday</td>
            <td rowspan="2">8</td>
            <td rowspan="2">5</td>
            <td>introduction to XML</td>
        </tr>
        <tr>
            <td>Validity:DTD and Relax NG</td>
        </tr>
        <tr>
            <td rowspan="3">Tuesday</td>
            <td>8</td>
            <td>11</td>
            <td>XPath</td>
        </tr>
        <tr>
            <td>11</td>
            <td>2</td>
            <td rowspan="2">XSL Transformation</td>
        </tr>
        <tr>
            <td>2</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>8</td>
            <td>12</td>
            <td>XSL Formatting Objects</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
