<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
      table,
      th,
      tr,
      td {
        border: 1px solid black;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th rowspan="3">Day</th>  <!--Creates a header cell named Day.rowspan="3" means it covers 3 rows vertically. -->
          <th colspan="3">Seminar</th> <!-- Creates Seminar heading.colspan="3" means it spans 3 columns horizontally. -->
        </tr>
        <tr>
            <th colspan="2">Schedule</th> <!--Schedule spans 2 columns. -->
            <th rowspan="2">Topic</th>  <!--Topic spans 2 rows vertically. -->
        </tr>
        <tr>
            <th>being</th> <!-- Header cell named being.Usually should be Begin. -->
            <th>end</th> <!--Header cell named End. -->
        </tr>
      </thead>
      <tbody>
        <tr>
            <td rowspan="2">Monday</td><!--Monday spans 2 rows. -->
            <td rowspan="2">8</td><!--Begin time spans 2 rows. -->
            <td rowspan="2">5</td><!--End time spans 2 rows. -->
            <td>introduction to XML</td><!-- Topic is Introduction to XML. -->
        </tr>
        <tr>
            <td>Validity:DTD and Relax NG</td><!-- Second topic for Monday. -->
        </tr>
        <tr>
            <td rowspan="3">Tuesday</td><!--Tuesday spans 3 rows. -->
            <td>8</td> <!--Begin time. -->
             <td>11</td><!--End time -->
             <td>XPath</td><!--Topic spans 2 rows. -->
        </tr>
        <tr>
            <td>11</td>
            <td>2</td>
            <td rowspan="2">XSL Transformation</td>
        </tr>
        <tr>
            <td>2</td>
            <td>5</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>8</td>
            <td>12</td>
            <td>XSL Formatting Objects</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
