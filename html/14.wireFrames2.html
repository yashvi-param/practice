<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wireframe2</title>
    <style>
        header,
        aside,
        section{
            border:1px solid black;
        }
        nav{
           align-items: center;
           justify-content: center;
           display: flex;
           flex-direction: column;
        }
        ul{
            display: flex;
            gap: 20px;
        }
        li{
            display: flex;
        } 
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>logo</h1>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Service</li>
                <li>help</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>

    <main>
        <aside>sidebar</aside>
        <!-- Sidebar બનાવે છે.
        Screen પર "sidebar" લખેલું દેખાશે. -->
        <section>this is home section</section>
        <!-- Main content section.
        "this is home section" લખેલું દેખાશે. -->
    </main>
    <footer>
        <section>this is footer section</section>
        <!-- Footer content. -->
    </footer>
</body>
</html>
