<!doctype html>
<html lang="en">
  <head>

    <title>iframe</title>

  <body>
    <h1>Embaded map</h1>
     <div class="map-wrapper"><!--class="map-wrapper" can be used for CSS styling. -->

        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <p>
      open in google maps:
      <a href="https://maps.app.goo.gl/7AXBagVK7VbJoy2C8">Bhavanagar, India</a>

  </body>
</html>
