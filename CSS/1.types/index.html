<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css style</title>
    <link rel="stylesheet" href="style.css">  <!--Connects the external CSS file named style.css. -->
    <style>
        .internal{
            color: #7fff00;
            font-size: 50px;
        }
        .common{
            font-size: 50px;
        }
    </style>
    <!-- this is internal css which is write in html file  -->
</head>
<body>
    <!-- types of css -->

    <!-- 1.inline -->

    <!-- inline css means this is use in tag -->

    <p style="color: blueviolet">this is inline css</p>    

    <p class="internal">this is internal style</p>

    <p class="external">this is external paragraph</p>

    <p class="common" style="color: brown;">this is common paragraph for all types</p>
</body>
</html>
