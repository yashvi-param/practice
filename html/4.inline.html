<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline tag</title>
</head>
<body>
   

    <i>this is italic</i>

    <br/>



    <em>this is emphasize which will work like italic</em>

    <br/>

    <b>this is bold</b>

    <br/>

    <strong>this is strong</strong>

    <br/>

    <u>this is underline</u>

    <br/>

    <mark> this is highlight which will highlight text</mark>
    <br/>
    <del> this is delete which will work as strict out </del>

    <p>h<sub>2</sub>o</p>

    <br/>

    <p>a<sup>2</sup>b<sup>2</sup></p>

    <br/>

    <small>this is small text</small>

    <br/>

    <ins>this is inserted line</ins>

</body>
</html>
